<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diário Alimentar — kcal e macros</title>
  <meta name="description" content="Diário alimentar local-first com base TACO. Registro por texto, cálculo de kcal e macros, meta por Mifflin-St Jeor." />
  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🍎 Diário Alimentar</div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="hoje">Hoje</button>
      <button class="tab-btn" data-tab="hist">Histórico</button>
      <button class="tab-btn" data-tab="alimentos">Alimentos</button>
      <button class="tab-btn" data-tab="perfil">Perfil</button>
      <button class="tab-btn" data-tab="dados">Dados</button>
    </nav>
  </header>

  <main>
    <section id="tab-hoje" class="tab active"></section>
    <section id="tab-hist" class="tab"></section>
    <section id="tab-alimentos" class="tab"></section>
    <section id="tab-perfil" class="tab"></section>
    <section id="tab-dados" class="tab"></section>
  </main>

  <footer class="foot">
    Dados só neste aparelho · Base TACO 4ª ed. (NEPA/UNICAMP) · Fase 1 sem IA/servidor
  </footer>

  <!-- ordem importa: base -> medidas -> parser -> cálculo -> storage -> charts -> app -->
  <script src="js/db.js"></script>
  <script src="js/measures.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/nutrition.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
